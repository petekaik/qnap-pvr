services:

  epg-grabber:
    image: epg-grabber:lts-alpine
    pull_policy: build
    build:
      context: .
      dockerfile: ./epg-grabber/Dockerfile
    container_name: epg-grabber
    hostname: epg-grabber
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 32M
    environment:
      - TZ=${TZ}
      - INTERVAL_SECONDS=${INTERVAL_SECONDS}
    volumes:
      - ${DATA}/tvheadend/config:/tvh-config
      - ${DATA}/tvheadend/epg:/output
    networks:
      - pvr_default

networks:
  pvr_default:
    name: pvr_default
