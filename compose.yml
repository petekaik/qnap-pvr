services:

  tvheadend:
    # PVR fork of the upstream linuxserver/tvheadend image. We
    # copy a new `postproc.js` and lightly patched `dvr.js` /
    # `status.js` into the upstream image's webui directory at
    # build time. The upstream TVH serves every `*.js` in that
    # directory via the standard bundle path, so the new module
    # is reachable in the browser without any additional image
    # patches.
    #
    # The Post-Processing tab in the webui fetches queue JSON
    # from pvr-queue-exposer. The exposer is on the macvlan
    # eth1 network with a fixed LAN IP (PVR_EXPOSER_IP) so the
    # browser can reach it. See pvr-tvhd/README.md.
    image: pvr-tvheadend:latest
    pull_policy: build
    build:
      context: ./pvr-tvhd
      # Bake the queue-exposer LAN URL into postproc.js at
      # image build time. Compose reads PVR_EXPOSER_LAN_URL
      # from .env automatically. The value lands in
      # postproc.js, where the browser will fetch queue
      # JSON from it. There is no way for the browser to
      # discover this URL at runtime because the in-compose
      # DNS name 'pvr-queue-exposer' is unreachable from the
      # browser's network.
      args:
        PVR_EXPOSER_LAN_URL: ${PVR_EXPOSER_LAN_URL:-http://10.0.10.13:8765}
    container_name: tvheadend
    hostname: tvheadend
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 128M
    environment:
      # PUID/PGID are honored by the linuxserver/tvheadend
      # entrypoint, which chowns /config to the requested uid
      # at startup. 0/0 means "leave the host's existing
      # permissions alone" which is what we want — the existing
      # ${DATA}/tvheadend/config tree is owned by the host
      # admin user, and changing that would break QNAP's
      # permission model.
      - PUID=0
      - PGID=0
      - TZ=${TZ}
      # Post-processing path mapping (overridable via .env).
      - PVR_HOST_PREFIX=${PVR_HOST_PREFIX}
      - PVR_LOG_PATH=${PVR_LOG_PATH}
    privileged: true
    volumes:
      - ${DATA}/tvheadend/config:/config
      - ${DATA}/tvheadend/epg:/epg
      - ${DATA}/media/recordings:/recordings
      # TVH post-recording hook + shared config. Mounted read-only so
      # TVH cannot mutate the scripts, but edits on the host take effect
      # on next container restart (no rebuild needed).
      - ${DATA}/scripts:/pvr/scripts:ro
      # Shell-only YAML parser used by post-recording.sh. Mounted into
      # /usr/local/bin so the script can . it directly.
      - ${DATA}/scripts/config-loader.sh:/usr/local/bin/config-loader.sh:ro
      # linuxserver-image's tvh-healthcheck.sh — needed by the
      # compose healthcheck. Bind-mounted read-only.
      - ${DATA}/scripts/tvh-healthcheck.sh:/usr/local/bin/tvh-healthcheck.sh:ro
      # Queue directories shared with the comskip/transcode containers.
      # post-recording.sh appends one JSONL line per recording into
      # both queues; the worker containers read and remove them.
      # These MUST be writable from the tvheadend container.
      - ${DATA}/comskip/queue:/comskip/queue
      - ${DATA}/transcoder/queue:/transcoder/queue
      # Shared scratch directory for transient files (locks, FFmpeg
      # logs, channel-name list). Host-side path lives on the big
      # volume so the 64MB /tmp ramdisk never fills up. The path
      # inside the container is /pvr/tmp — see comskip-pool.sh,
      # transcode-pool.sh, and post-recording.sh.
      - ${DATA}/tmp:/pvr/tmp
    devices:
      - /dev/dvb:/dev/dvb
    healthcheck:
      # linuxserver/tvheadend ships a tvh-healthcheck.sh that
      # curl's the api/serverinfo endpoint and waits up to 2
      # minutes for the HTTP server to come up. We bind-mount
      # it into the container (the file lives on the host in
      # ${DATA}/scripts/, which is also where post-recording
      # scripts live).
      test: ["CMD", "/usr/local/bin/tvh-healthcheck.sh"]
      interval: 30s
      timeout: 35s
      retries: 5
      start_period: 60s
    networks:
      # eth1 (macvlan) gives TVH its fixed LAN IP. pvr_internal
      # connects it to pvr-queue-exposer so the webui's
      # Post-Processing tab can fetch queue JSON via XHR. macvlan
      # networks cannot talk to bridge networks directly, so we
      # explicitly attach TVH to both — the macvlan interface
      # gives the LAN-facing address, the bridge interface
      # gives the inter-service channel.
      eth1:
        ipv4_address: ${LOCAL_IPV4_1}
      pvr_internal:

  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    hostname: jellyfin
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 128M
    volumes:
      - ${DATA}/jellyfin/config:/config
      - ${DATA}/jellyfin/cache:/cache
      - ${DATA}/media/recordings:/recordings
      - ${DATA}/media/transcoded:/media/transcoded
      - ${DATA}/media/tv:/tv
    devices:
      - /dev/dri:/dev/dri
    environment:
      - TZ=${TZ}
    networks:
      eth1:
        ipv4_address: ${LOCAL_IPV4_2}

  comskip:
    image: pvr-comskip:latest
    pull_policy: build
    build:
      context: ./comskip
      dockerfile: Dockerfile
    container_name: comskip
    hostname: comskip
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      - TZ=${TZ}
    volumes:
      - ${DATA}/media/recordings:/recordings
      - ${DATA}/tvheadend/config/dvr/log:/config/dvr/log:ro
      # Comskip config and runtime scripts live under comskip/etc on
      # the host. The entrypoint and pool script are image-baked; this
      # mount overrides the host copy of config.yaml and comskip.ini.
      - ${DATA}/comskip/etc:/etc/comskip:ro
      - ${DATA}/comskip/queue:/comskip/queue
      - ${DATA}/tmp:/pvr/tmp
    # network_mode: none — this container has no use for any network
    # at runtime. Communication with TVH happens through the shared
    # ${DATA}/comskip/queue filesystem, not over TCP. The comskip
    # binary does not phone home, the pool script does not fetch
    # anything, and the entrypoint does not call out. Cutting the
    # network means a compromised comskip binary cannot exfiltrate
    # data or reach the host's other services. The build phase
    # (docker build) uses its own build network and is unaffected.
    network_mode: none

  transcode:
    image: pvr-transcode:latest
    pull_policy: build
    build:
      context: ./transcoder
      dockerfile: Dockerfile
    container_name: transcode
    hostname: transcode
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '3.0'
          memory: 2G
        reservations:
          cpus: '0.1'
          memory: 64M
    environment:
      - TZ=${TZ}
      - TRANSCODE_CRON=${TRANSCODE_CRON}
    volumes:
      - ${DATA}/media/recordings:/recordings
      - ${DATA}/media/transcoded:/media/transcoded
      - ${DATA}/tvheadend/config/dvr/log:/config/dvr/log:ro
      - ${DATA}/transcoder/scripts:/etc/transcoder:ro
      - ${DATA}/transcoder/queue:/transcoder/queue
      - ${DATA}/tmp:/pvr/tmp
    # network_mode: none — see comskip comment above. FFmpeg reads
    # only local files, generate-nfo.py only calls a local Jellyfin
    # URL through the shared /media/transcoded filesystem (it does
    # not actually call the Jellyfin HTTP API at runtime — the
    # JELLYFIN_API_KEY env var is reserved for future use), and
    # the pool/entrypoint scripts do no network I/O.
    network_mode: none

  # pvr-queue-exposer — HTTP bridge that serves PVR queue files
  # and logs as JSON. Read-only MVP: GET /api/* endpoints, no
  # POST.
  #
  # Two networks:
  #   - pvr_internal — the inter-service Docker network. The
  #     comskip and transcode queue directories are mounted
  #     here, and TVH's compositor (e.g. status checks) reads
  #     them through this network's DNS name.
  #   - eth1 (macvlan) — exposes port 8765 to the LAN with a
  #     fixed IP. The browser tab in the webui fetches queue
  #     state from here, because the browser cannot resolve the
  #     in-compose hostname 'pvr-queue-exposer'. The macvlan
  #     interface means TVH and the browser both see this
  #     address, but the queue file paths are still hidden
  #     behind a JSON API.
  #
  # The endpoint is read-only. There are no secrets in the JSON
  # responses; the only privacy implication is that LAN clients
  # can see which recordings are queued or recently finished.
  pvr-queue-exposer:
    image: pvr-queue-exposer:latest
    pull_policy: build
    build:
      context: ./pvr-queue-exposer
    container_name: pvr-queue-exposer
    hostname: pvr-queue-exposer
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 32M
    environment:
      - TZ=${TZ}
      - COMSKIP_QUEUE=/comskip/queue/comskip-queue.jsonl
      - COMSKIP_DONE=/comskip/queue/comskip-queue.done
      - COMSKIP_LOG=/comskip/queue/comskip.log
      - TRANSCODE_QUEUE=/transcoder/queue/transcode-queue.jsonl
      - TRANSCODE_DONE=/transcoder/queue/transcode-queue.done
      - TRANSCODE_LOG=/var/log/transcode-nightly.log
    volumes:
      # Same queue mounts as comskip and transcode — read-only
      # is enough for MVP.
      - ${DATA}/comskip/queue:/comskip/queue:ro
      - ${DATA}/transcoder/queue:/transcoder/queue:ro
      - ${DATA}/tvheadend/config/dvr/log:/var/log:ro
    networks:
      pvr_internal:
      eth1:
        ipv4_address: ${PVR_EXPOSER_IP}
    healthcheck:
      # 127.0.0.1 (not localhost) to dodge Alpine IPv6-first
      # DNS behaviour. Python http.server takes a moment to
      # warm up after container start — generous start_period.
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8765/api/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  pvr_internal:
    name: pvr_internal
    internal: true
    ipam:
      config:
        - subnet: 172.25.0.0/16
  eth1:
    external: true
    name: eth1